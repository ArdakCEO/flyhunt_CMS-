<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Статья — Flyhunt</title>
<meta name="description" id="pageDesc" content="">
<link rel="icon" type="image/png" href="/images/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
<style>
.page-wrap{padding:64px 0 96px;max-width:760px;margin:0 auto}
.back{display:inline-block;margin-bottom:18px;font-size:14px;font-weight:700;color:var(--violet)}
.art-cover{height:260px;border-radius:var(--radius);background:linear-gradient(120deg,#C9B8FC,#BDE7FC);display:flex;align-items:center;justify-content:center;font-size:56px;margin-bottom:28px;overflow:hidden}
.art-cover img{width:100%;height:100%;object-fit:cover}
.art-date{font-size:13px;color:var(--dim);font-weight:600;display:block;margin-bottom:8px}
h1{font-size:clamp(28px,4vw,42px);line-height:1.15;margin-bottom:24px}
.art-body p{font-size:16.5px;line-height:1.75;color:#2A2E55;margin-bottom:16px}
</style>
</head>
<body>
<div class="aurora" aria-hidden="true"><i class="a1"></i><i class="a2"></i><i class="a3"></i></div>
<header><div class="container nav">
  <a class="logo" href="/"><img src="/images/logo.png" alt="Flyhunt"></a>
  <nav class="nav-links"><a href="/#solution-1">Решения</a><a href="/blog/">Блог</a><a href="/events/">Ивенты</a><a href="/#community">Сообщество AI для HR</a></nav>
  <div class="nav-right"><a class="btn-login" href="https://app.flyhunt.ai" target="_blank" rel="noopener">Войти</a></div>
</div></header>
<main class="container page-wrap">
  <a class="back" href="/blog/">← Все статьи</a>
  <div id="content">Загрузка…</div>
</main>
<footer><div class="container"><p class="copy">© <span id="year"></span> Flyhunt Ltd. Все права защищены.</p></div></footer>
<script>
document.getElementById('year').textContent = new Date().getFullYear();
function fmtDateRu(iso){const d=new Date(iso+'T00:00:00');const m=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];return `${d.getDate()} ${m[d.getMonth()]} ${d.getFullYear()}`;}
const slug = new URLSearchParams(location.search).get('slug');
fetch('/content/blog.json',{cache:'no-store'}).then(r=>r.json()).then(data=>{
  const p = (data.items||[]).find(x=>x.slug===slug);
  const el = document.getElementById('content');
  if(!p){ el.innerHTML='<p style="color:var(--dim)">Статья не найдена. <a href="/blog/">Вернуться в блог</a></p>'; return; }
  document.getElementById('pageTitle').textContent = p.title + ' — Flyhunt';
  document.getElementById('pageDesc').setAttribute('content', p.excerpt||'');
  el.innerHTML = `
    <div class="art-cover">${p.cover?`<img src="${p.cover}" alt="">`:'💜'}</div>
    <span class="art-date">${fmtDateRu(p.date)}</span>
    <h1>${p.title}</h1>
    <div class="art-body">${p.body}</div>`;
}).catch(()=>{ document.getElementById('content').innerHTML='<p style="color:var(--dim)">Не удалось загрузить статью.</p>'; });
</script>
</body>
</html>
